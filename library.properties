sentence=High-performance embedded C++ libraries for ESP32, STM32 and other MCUs: SD card filesystem abstraction (SPI and SDMMC).
paragraph=Embedded C++17 SD card filesystem abstraction. Platform-agnostic IFileSystem / IFile interfaces keep consumers free of ESP-IDF VFS. Backends: EspSdFilesystem (SPI mode) and EspSdmmcFilesystem (native 4-bit SDMMC). Supported targets: ESP32 today (both backends); STM32 and other MCUs planned once a matching HAL backend is added.
